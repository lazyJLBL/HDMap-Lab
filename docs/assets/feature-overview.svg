<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="410" viewBox="0 0 1180 410" role="img" aria-label="HDMap-Lab feature overview">
  <rect width="1180" height="410" fill="#ffffff"/>
  <text x="40" y="48" font-family="Inter,Arial" font-size="28" font-weight="700" fill="#0f172a">Feature Overview</text>
  <g font-family="Inter,Arial">
    <rect x="40" y="88" width="250" height="120" rx="8" fill="#eff6ff" stroke="#3b82f6"/>
    <text x="68" y="124" font-size="18" font-weight="700" fill="#1e3a8a">Spatial Query</text>
    <text x="68" y="154" font-size="14" fill="#334155">nearby roads, bbox query</text>
    <text x="68" y="178" font-size="14" fill="#334155">points in polygon</text>
