<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="360" viewBox="0 0 1180 360" role="img" aria-label="HDMap-Lab system architecture">
  <rect width="1180" height="360" fill="#f8fafc"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <text x="40" y="46" font-family="Inter,Arial" font-size="28" font-weight="700" fill="#0f172a">HDMap-Lab Architecture</text>
  <g font-family="Inter,Arial" font-size="16" fill="#0f172a">
    <rect x="40" y="95" width="140" height="90" rx="8" fill="#dbeafe" stroke="#60a5fa"/>
    <text x="68" y="132" font-weight="700">GeoJSON</text>
    <text x="76" y="158">OSM XML</text>
    <rect x="235" y="95" width="140" height="90" rx="8" fill="#dcfce7" stroke="#22c55e"/>
    <text x="275" y="132" font-weight="700">Loader</text>
    <text x="258" y="158">validation</text>
    <rect x="430" y="95" width="150" height="90" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="467" y="132" font-weight="700">SQLite</text>
    <text x="455" y="158">runtime store</text>
    <rect x="635" y="65" width="155" height="70" rx="8" fill="#ede9fe" stroke="#8b5cf6"/>
    <text x="670" y="103" font-weight="700">R-Tree</text>
    <rect x="635" y="160" width="155" height="70" rx="8" fill="#ede9fe" stroke="#8b5cf6"/>
    <text x="670" y="198" font-weight="700">KD-Tree</text>
    <rect x="845" y="95" width="150" height="90" rx="8" fill="#fee2e2" stroke="#ef4444"/>
    <text x="875" y="125" font-weight="700">Algorithms</text>
    <text x="870" y="152">match / route</text>
    <rect x="1040" y="65" width="110" height="70" rx="8" fill="#ccfbf1" stroke="#14b8a6"/>
    <text x="1072" y="105" font-weight="700">API</text>
    <rect x="1040" y="165" width="110" height="70" rx="8" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="1060" y="205" font-weight="700">Frontend</text>
  </g>
  <g stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)" fill="none">
    <path d="M180 140 H235"/>
    <path d="M375 140 H430"/>
    <path d="M580 140 C610 140 605 100 635 100"/>
    <path d="M580 140 C610 140 605 195 635 195"/>
    <path d="M790 100 C820 100 815 140 845 140"/>
    <path d="M790 195 C820 195 815 140 845 140"/>
    <path d="M995 140 C1020 140 1015 100 1040 100"/>
    <path d="M995 140 C1020 140 1015 200 1040 200"/>
  </g>
  <text x="40" y="292" font-family="Inter,Arial" font-size="16" fill="#475569">Data flow: GeoJSON / OSM -> Loader -> SQLite runtime store -> Spatial indexes -> Algorithms -> FastAPI -> React + Leaflet</text>
</svg>

